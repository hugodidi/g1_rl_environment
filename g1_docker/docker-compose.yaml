services:
  ros_humble_g1_beyondmimic:
    build:
      context: .
      dockerfile: Dockerfile.g1_beyondmimic
    container_name: ros_humble_g1_beyondmimic
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.docker.xauth
      - ROS_DOMAIN_ID=0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw
      - $HOME/.Xauthority:/root/.Xauthority:rw
    privileged: true
    network_mode: "host"
    devices:
      - /dev/dri:/dev/dri
    stdin_open: true
    tty: true
    restart: unless-stopped

