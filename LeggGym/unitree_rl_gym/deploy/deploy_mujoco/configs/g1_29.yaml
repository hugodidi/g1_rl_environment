# g1_29.yaml
policy_path: "{LEGGED_GYM_ROOT_DIR}/deploy/pre_train/g1/policy_lstm_2.pt"
xml_path: "{LEGGED_GYM_ROOT_DIR}/resources/robots/g1_description/scene_29.xml"

# Total simulation time
simulation_duration: 60.0
# Simulation time step
simulation_dt: 0.002
# Controller update frequency (simulation_dt * control_decimation = 0.02; 50Hz)
control_decimation: 10

# PD gains per joint (29 DoF) in MuJoCo joint order:
#  1 left_hip_pitch_joint
#  2 left_hip_roll_joint
#  3 left_hip_yaw_joint
#  4 left_knee_joint
#  5 left_ankle_pitch_joint
#  6 left_ankle_roll_joint
#  7 right_hip_pitch_joint
#  8 right_hip_roll_joint
#  9 right_hip_yaw_joint
# 10 right_knee_joint
# 11 right_ankle_pitch_joint
# 12 right_ankle_roll_joint
# 13 waist_yaw_joint
# 14 waist_roll_joint
# 15 waist_pitch_joint
# 16 left_shoulder_pitch_joint
# 17 left_shoulder_roll_joint
# 18 left_shoulder_yaw_joint
# 19 left_elbow_joint
# 20 left_wrist_roll_joint
# 21 left_wrist_pitch_joint
# 22 left_wrist_yaw_joint
# 23 right_shoulder_pitch_joint
# 24 right_shoulder_roll_joint
# 25 right_shoulder_yaw_joint
# 26 right_elbow_joint
# 27 right_wrist_roll_joint
# 28 right_wrist_pitch_joint
# 29 right_wrist_yaw_joint

kps: [
  100, 100, 100, 150,  40,  40,   #  1–6  legs (left)
  100, 100, 100, 150,  40,  40,   #  7–12 legs (right)
   50,  50,  50,                  # 13–15 waist
   30,  30,  30,                  # 16–18 left shoulder
   20,  20,  20,  20,             # 19–22 left arm distal
   30,  30,  30,                  # 23–25 right shoulder
   20,  20,  20,  20              # 26–29 right arm distal
]

kds: [
  2, 2, 2, 4, 2, 2,               #  1–6  legs (left)
  2, 2, 2, 4, 2, 2,               #  7–12 legs (right)
  1, 1, 1,                        # 13–15 waist
  0.5, 0.5, 0.5,                  # 16–18 left shoulder
  0.5, 0.5, 0.5, 0.5,             # 19–22 left arm distal
  0.5, 0.5, 0.5,                  # 23–25 right shoulder
  0.5, 0.5, 0.5, 0.5              # 26–29 right arm distal
]

# Initial joint positions, aligned with IsaacLab G1_CYLINDER_CFG.init_state
# and ordered exactly like the joint list printed by MuJoCo.
default_angles: [
  -0.312,   #  1 left_hip_pitch_joint
   0.0,     #  2 left_hip_roll_joint
   0.0,     #  3 left_hip_yaw_joint
   0.669,   #  4 left_knee_joint
  -0.363,   #  5 left_ankle_pitch_joint
   0.0,     #  6 left_ankle_roll_joint

  -0.312,   #  7 right_hip_pitch_joint
   0.0,     #  8 right_hip_roll_joint
   0.0,     #  9 right_hip_yaw_joint
   0.669,   # 10 right_knee_joint
  -0.363,   # 11 right_ankle_pitch_joint
   0.0,     # 12 right_ankle_roll_joint

   0.0,     # 13 waist_yaw_joint
   0.0,     # 14 waist_roll_joint
   0.0,     # 15 waist_pitch_joint

   0.2,     # 16 left_shoulder_pitch_joint
   0.2,     # 17 left_shoulder_roll_joint
   0.0,     # 18 left_shoulder_yaw_joint
   0.6,     # 19 left_elbow_joint
   0.0,     # 20 left_wrist_roll_joint
   0.0,     # 21 left_wrist_pitch_joint
   0.0,     # 22 left_wrist_yaw_joint

   0.2,     # 23 right_shoulder_pitch_joint
  -0.2,     # 24 right_shoulder_roll_joint
   0.0,     # 25 right_shoulder_yaw_joint
   0.6,     # 26 right_elbow_joint
   0.0,     # 27 right_wrist_roll_joint
   0.0,     # 28 right_wrist_pitch_joint
   0.0      # 29 right_wrist_yaw_joint
]

ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05

# Start small for stability, you can increase later (0.1, 0.15, …)
action_scale: 0.05

cmd_scale: [2.0, 2.0, 0.25]
num_actions: 29
num_obs: 47

cmd_init: [0.5, 0, 0]

